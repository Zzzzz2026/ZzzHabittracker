<style>
:root{
  --bg:#fafafa;
  --card:#ffffff;
  --ink:#18181b;
  --sub:#9a9ba3;
  --line:#e7e7ea;
  --accent:#5b5bf6;
  --cell-muted:#d4d4d8;
  --overlay:rgba(24,24,27,.4);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0e0e10;
    --card:#1c1c1f;
    --ink:#f4f4f5;
    --sub:#8b8d98;
    --line:#2c2c30;
    --accent:#818cf8;
    --cell-muted:#48484f;
    --overlay:rgba(0,0,0,.6);
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:640px;margin:0 auto;padding:24px 16px 60px;}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
header h1{font-size:19px;margin:0;font-weight:700;letter-spacing:-.01em;}
.add-btn{
  background:var(--accent);color:#fff;border:none;width:32px;height:32px;border-radius:10px;
  font-size:19px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;
}
.backup-row{display:flex;gap:16px;margin-top:18px;}
.link-btn{background:none;border:none;color:var(--sub);font-size:11px;cursor:pointer;padding:0;white-space:nowrap;font-weight:500;}
.link-btn:active{color:var(--ink);}

.table-card{background:var(--card);border-radius:14px;border:1px solid var(--line);overflow:hidden;}
table{border-collapse:collapse;width:100%;table-layout:fixed;}
th, td{padding:0;text-align:center;}
thead th{
  padding:10px 2px;font-weight:600;color:var(--sub);font-size:10px;border-bottom:1px solid var(--line);
  text-transform:uppercase;letter-spacing:.02em;
}
thead th .d{font-size:12px;font-weight:700;color:var(--ink);display:block;text-transform:none;margin-bottom:2px;}
thead th.today{color:var(--accent);}
thead th.today .d{color:var(--accent);}
thead th.name-col{text-align:left;padding-left:12px;text-transform:none;font-weight:600;}

.habit-row td{border-bottom:1px solid var(--line);height:56px;}
.habit-row:last-child td{border-bottom:none;}
.name-cell{
  display:flex;align-items:center;gap:9px;padding:0 6px 0 12px;height:56px;cursor:pointer;
}
.hicon{
  width:19px;height:19px;border-radius:50%;flex-shrink:0;border:2px solid;
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;
}
.hicon.off{background:transparent;}
.hname-wrap{overflow:hidden;min-width:0;}
.hname{
  font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.hcount{
  font-size:10.5px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px;
}

.cell{cursor:pointer;font-size:14px;font-weight:700;color:var(--cell-muted);user-select:none;}
.cell.future{opacity:.3;cursor:default;}

.empty-state{text-align:center;color:var(--sub);padding:60px 20px;font-size:14px;}
.empty-state .big{font-size:38px;margin-bottom:10px;}

.modal-bg{
  position:fixed;inset:0;background:var(--overlay);display:none;
  align-items:center;justify-content:center;z-index:10;padding:20px;
}
.modal-bg.open{display:flex;}
.modal{background:var(--card);border-radius:16px;padding:22px;width:320px;max-width:100%;max-height:88vh;overflow-y:auto;}
.modal h3{margin:0 0 14px;font-size:16px;font-weight:700;}
.modal input{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
  font-size:14px;margin-bottom:12px;font-family:inherit;background:var(--bg);color:var(--ink);
}
.modal input:focus{outline:none;border-color:var(--accent);}
.field-label{font-size:11px;color:var(--sub);margin:0 0 8px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
.color-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
.color-opt{
  width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;box-shadow:0 0 0 1px var(--line) inset;
}
.color-opt.sel{border-color:var(--ink);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.btn{padding:9px 16px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
.btn.primary{background:var(--accent);color:#fff;}
.btn.ghost{background:var(--bg);color:var(--ink);border:1px solid var(--line);}
.btn.danger{background:none;color:#e5484d;padding:9px 4px;}

.detail-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.detail-head .title{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;}
.detail-close{border:none;background:none;color:var(--sub);font-size:18px;cursor:pointer;}
.detail-total{font-size:12px;color:var(--sub);margin-bottom:14px;}
.month-head{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--sub);margin-bottom:8px;font-weight:600;}
.month-head button{border:none;background:none;color:var(--sub);cursor:pointer;font-size:16px;padding:2px 8px;}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-size:10px;color:var(--sub);text-align:center;margin-bottom:4px;font-weight:600;}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.day{
  aspect-ratio:1;border-radius:8px;background:var(--bg);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:11px;color:var(--ink);gap:1px;line-height:1;
}
.day .day-num{font-size:10px;}
.day .day-mark{font-size:12px;font-weight:700;}
.day.done{color:#fff;}
.day.pad{background:transparent;cursor:default;}
.day.future{opacity:.35;cursor:default;}
.day.today{box-shadow:inset 0 0 0 2px var(--accent);}
.detail-delete{margin-top:16px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Habit Tracker</h1>
    <button class="add-btn" id="openAdd">+</button>
  </header>

  <div class="table-card">
    <table id="habitTable">
      <colgroup>
        <col style="width:34%">
        <col><col><col><col><col><col><col>
      </colgroup>
      <thead><tr id="headRow"></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="big">🌱</div>
    No habits yet. Tap + to add your first one.
  </div>

  <div class="backup-row">
    <button class="link-btn" id="exportBtn">Export backup</button>
    <button class="link-btn" id="importBtn">Import backup</button>
    <input type="file" id="importFile" accept="application/json" style="display:none;">
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>New habit</h3>
    <input type="text" id="habitNameInput" placeholder="e.g. Sleep early, Drink water, Read" maxlength="24">
    <div class="field-label">Color</div>
    <div class="color-row" id="colorRow"></div>
    <div class="modal-actions">
      <button class="btn ghost" id="cancelAdd">Cancel</button>
      <button class="btn primary" id="confirmAdd">Add</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="detailModalBg">
  <div class="modal" id="detailModalBody"></div>
</div>

<script>
const COLORS = ['#5b5bf6','#ef4444','#10b981','#f59e0b','#ec4899','#06b6d4','#8b5cf6','#64748b'];
const STORAGE_KEY = 'habit_tracker_data_v1';
const WEEKDAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = 7;

function todayStr(){ return fmt(new Date()); }
function fmt(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function addDays(d, n){ const nd = new Date(d); nd.setDate(nd.getDate()+n); return nd; }

function loadData(){
  let raw;
  try{ raw = localStorage.getItem(STORAGE_KEY); }catch(e){ raw = null; }
  if(!raw) return {habits:[], entries:{}};
  let data;
  try{ data = JSON.parse(raw); }catch(e){ return {habits:[], entries:{}}; }
  const habits = (data.habits||[]).map((h,i)=>({
    id:h.id, name:h.name, color:h.color||COLORS[i%COLORS.length], createdAt:h.createdAt||todayStr()
  }));
  const entries = {};
  habits.forEach(h=>{ entries[h.id]={}; });
  if(data.entries){
    Object.keys(data.entries).forEach(hid=>{
      entries[hid] = entries[hid] || {};
      Object.keys(data.entries[hid]).forEach(ds=>{
        if(data.entries[hid][ds]==='done') entries[hid][ds]=true;
      });
    });
  }
  if(data.checkins){
    Object.keys(data.checkins).forEach(hid=>{
      entries[hid] = entries[hid] || {};
      (data.checkins[hid]||[]).forEach(ds=>{ entries[hid][ds]=true; });
    });
  }
  return {habits, entries};
}
function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

let state = loadData();
let selectedColor = COLORS[0];
let detailHabitId = null;
let detailYear = null;
let detailMonth = null;

function isDone(habitId, ds){ return !!(state.entries[habitId]||{})[ds]; }
function toggleEntry(habitId, ds, isFuture){
  if(isFuture) return;
  if(!state.entries[habitId]) state.entries[habitId]={};
  if(state.entries[habitId][ds]) delete state.entries[habitId][ds];
  else state.entries[habitId][ds]=true;
  saveData();
  render();
  if(detailHabitId===habitId) renderDetailModal();
}
function totalDone(habitId){ return Object.keys(state.entries[habitId]||{}).length; }

function deleteHabit(id){
  if(!confirm('Delete this habit? All check-in records will be removed too.')) return;
  state.habits = state.habits.filter(h=>h.id!==id);
  delete state.entries[id];
  saveData();
  closeDetail();
  render();
}
function addHabit(name, color){
  const id = 'h'+Date.now();
  state.habits.push({id, name, color, createdAt: todayStr()});
  state.entries[id] = {};
  saveData();
  render();
}

function dateRange(){
  const arr = [];
  for(let i=0;i<DAYS;i++) arr.push(addDays(new Date(), -i));
  return arr;
}

function render(){
  const dates = dateRange();
  const todayDs = todayStr();

  const headRow = document.getElementById('headRow');
  let headHtml = `<th class="name-col"></th>`;
  dates.forEach(d=>{
    const ds = fmt(d);
    const isToday = ds===todayDs;
    headHtml += `<th class="${isToday?'today':''}"><span class="d">${d.getMonth()+1}/${String(d.getDate()).padStart(2,'0')}</span>${WEEKDAYS[d.getDay()]}</th>`;
  });
  headRow.innerHTML = headHtml;

  const body = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  const tableCard = document.querySelector('.table-card');
  if(state.habits.length===0){
    empty.style.display='block';
    tableCard.style.display='none';
    body.innerHTML='';
    return;
  }
  empty.style.display='none';
  tableCard.style.display='block';

  let rows = '';
  state.habits.forEach(h=>{
    const todayOn = isDone(h.id, todayDs);
    const icon = todayOn
      ? `<span class="hicon" style="background:${h.color};border-color:${h.color}">✓</span>`
      : `<span class="hicon off" style="border-color:${h.color}"></span>`;
    const count = totalDone(h.id);
    const dayLabel = count===1 ? 'day' : 'days';
    let cells = `<td class="name-col"><div class="name-cell" onclick="openDetail('${h.id}')">${icon}<div class="hname-wrap"><div class="hname" style="color:${h.color}">${h.name}</div><div class="hcount">${count} ${dayLabel}</div></div></div></td>`;
    dates.forEach(d=>{
      const ds = fmt(d);
      const isFuture = ds > todayDs;
      const done = !isFuture && isDone(h.id, ds);
      const text = isFuture ? '' : (done ? '√' : '×');
      const style = done ? `color:${h.color}` : '';
      cells += `<td class="cell ${isFuture?'future':''}" style="${style}" onclick="toggleEntry('${h.id}','${ds}',${isFuture})">${text}</td>`;
    });
    rows += `<tr class="habit-row">${cells}</tr>`;
  });
  body.innerHTML = rows;
}

function buildMonthCal(habitId, year, month){
  const first = new Date(year, month, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayDs = todayStr();
  const habit = state.habits.find(h=>h.id===habitId);
  let html = '';
  for(let i=0;i<startDow;i++) html += `<div class="day pad"></div>`;
  for(let day=1; day<=daysInMonth; day++){
    const d = new Date(year, month, day);
    const ds = fmt(d);
    const done = isDone(habitId, ds);
    const isFuture = ds > todayDs;
    const isToday = ds === todayDs;
    const mark = isFuture ? '' : (done ? '√' : '×');
    const style = done ? `background:${habit.color}` : '';
    html += `<div class="day ${done?'done':''} ${isFuture?'future':''} ${isToday?'today':''}" style="${style}" ${isFuture?'':`onclick="toggleEntry('${habitId}','${ds}',false)"`}><div class="day-num">${day}</div><div class="day-mark">${mark}</div></div>`;
  }
  const monthLabel = `${MONTHS[month]} ${year}`;
  return {html, monthLabel};
}

function openDetail(habitId){
  detailHabitId = habitId;
  const now = new Date();
  detailYear = now.getFullYear();
  detailMonth = now.getMonth();
  renderDetailModal();
  document.getElementById('detailModalBg').classList.add('open');
}
function closeDetail(){
  document.getElementById('detailModalBg').classList.remove('open');
  detailHabitId = null;
}
function shiftDetailMonth(delta){
  let m = detailMonth + delta;
  let y = detailYear;
  if(m<0){m=11;y--;}
  if(m>11){m=0;y++;}
  detailMonth=m; detailYear=y;
  renderDetailModal();
}
function renderDetailModal(){
  const habit = state.habits.find(h=>h.id===detailHabitId);
  if(!habit){ closeDetail(); return; }
  const {html: calHtml, monthLabel} = buildMonthCal(habit.id, detailYear, detailMonth);
  const total = totalDone(habit.id);
  const dayLabel = total===1 ? 'day' : 'days';
  document.getElementById('detailModalBody').innerHTML = `
    <div class="detail-head">
      <div class="title"><span class="hicon" style="background:${habit.color};border-color:${habit.color}">✓</span>${habit.name}</div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-total">${total} ${dayLabel} total</div>
    <div class="month-head">
      <button onclick="shiftDetailMonth(-1)">‹</button>
      <span>${monthLabel}</span>
      <button onclick="shiftDetailMonth(1)">›</button>
    </div>
    <div class="weekdays"><div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div></div>
    <div class="days">${calHtml}</div>
    <div class="detail-delete"><button class="btn danger" onclick="deleteHabit('${habit.id}')">Delete habit</button></div>
  `;
}
document.getElementById('detailModalBg').addEventListener('click', e=>{
  if(e.target.id==='detailModalBg') closeDetail();
});

const modalBg = document.getElementById('modalBg');
const colorRow = document.getElementById('colorRow');
function buildColorRow(){
  colorRow.innerHTML='';
  COLORS.forEach(c=>{
    const d = document.createElement('div');
    d.className = 'color-opt' + (c===selectedColor?' sel':'');
    d.style.background = c;
    d.onclick = ()=>{
      selectedColor = c;
      document.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('sel'));
      d.classList.add('sel');
    };
    colorRow.appendChild(d);
  });
}

document.getElementById('openAdd').onclick = ()=>{
  document.getElementById('habitNameInput').value='';
  selectedColor=COLORS[0];
  buildColorRow();
  modalBg.classList.add('open');
  document.getElementById('habitNameInput').focus();
};
document.getElementById('cancelAdd').onclick = ()=> modalBg.classList.remove('open');
document.getElementById('confirmAdd').onclick = ()=>{
  const name = document.getElementById('habitNameInput').value.trim();
  if(!name){ alert('Please enter a habit name.'); return; }
  addHabit(name, selectedColor);
  modalBg.classList.remove('open');
};
document.getElementById('habitNameInput').addEventListener('keydown', e=>{
  if(e.key==='Enter') document.getElementById('confirmAdd').click();
});
modalBg.addEventListener('click', e=>{ if(e.target===modalBg) modalBg.classList.remove('open'); });

document.getElementById('exportBtn').onclick = ()=>{
  const payload = JSON.stringify(state, null, 2);
  const blob = new Blob([payload], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `habit-backup-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
};
document.getElementById('importBtn').onclick = ()=>{
  document.getElementById('importFile').click();
};
document.getElementById('importFile').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    try{
      const data = JSON.parse(evt.target.result);
      if(!data || !Array.isArray(data.habits)){
        alert('Invalid file format.');
        return;
      }
      if(!confirm('Importing will overwrite all current habits and check-ins. Continue?')) return;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      state = loadData();
      render();
      alert('Import complete!');
    }catch(err){
      alert("Couldn't read the file. Make sure it's a backup exported from this tool.");
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

render();
</script>
</body>
</html>
